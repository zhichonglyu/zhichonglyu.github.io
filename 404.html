<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirecting...</title>
<script>
// Redirect old /:abbrlink/ URLs to new /posts/:abbrlink/
(function() {
  var path = window.location.pathname;
  // Match 8-char hex slug at root: /xxxxxxxx/ or /xxxxxxxx
  var match = path.match(/^\/([0-9a-f]{8})\/?$/);
  if (match) {
    window.location.replace('/posts/' + match[1] + '/');
    return;
  }
  // Not a redirect — show 404
  document.getElementById('msg').style.display = 'block';
})();
</script>
<style>
body { font-family: -apple-system, sans-serif; text-align: center; padding: 80px 20px; color: #333; }
h1 { font-size: 72px; margin: 0; color: #ddd; }
p { font-size: 18px; }
a { color: #49b1f5; text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="msg" style="display:none">
<h1>404</h1>
<p>Page not found.</p>
<p><a href="/">← Back to Home</a></p>
</div>
</body>
</html>
